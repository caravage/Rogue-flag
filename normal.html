<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz des Drapeaux — Mode Normal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/normal.css">
</head>
<body>
<div class="container">
  <header>
    <h1>Quiz des Drapeaux</h1>
    <p>Devinez le pays — 3 essais par drapeau</p>
  </header>

  <div class="menu-screen" id="menuScreen">
    <h2>Choisissez une catégorie</h2>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <div class="game-zone" id="gameZone">
    <div class="progress-track"><div class="progress-fill" id="progress" style="width:0%"></div></div>
    <div class="score-bar">
      <div class="score-item"><div class="label">Correct</div><div class="value correct" id="scoreCorrect">0</div></div>
      <div class="score-item"><div class="label">Erreurs</div><div class="value wrong" id="scoreWrong">0</div></div>
      <div class="score-item"><div class="label">Série</div><div class="value streak" id="scoreStreak">0</div></div>
    </div>
    <div class="card" id="gameCard">
      <div style="text-align:center"><span class="cat-tag" id="catTag"></span></div>
      <div class="flag-container"><img id="flagImg" src="" alt="Drapeau"></div>
      <div class="question-label">Question <span class="question-num" id="questionNum">1</span> / <span id="totalQ">20</span></div>
      <div class="attempts-bar" id="attemptsBar">
        <div class="attempt-dot available"></div><div class="attempt-dot available"></div><div class="attempt-dot available"></div>
      </div>
      <div class="input-row">
        <input type="text" id="answerInput" placeholder="Nom du pays..." autocomplete="off">
        <button id="submitBtn" onclick="checkAnswer()">Valider</button>
      </div>
      <div class="action-row">
        <button class="skip-btn" id="skipBtn" onclick="skipQuestion()">Passer ⏭</button>
        <button class="hint-btn" id="hintBtn" onclick="showHint()">Indice</button>
      </div>
      <div class="hint-text" id="hintText"></div>
      <div class="feedback" id="feedback">
        <div class="result-text" id="resultText"></div>
        <div class="answer-reveal" id="answerReveal"></div>
      </div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Suivant →</button>
      <div class="next-hint" id="nextHint">Entrée ou Espace pour continuer</div>
    </div>
    <div class="end-screen" id="endScreen">
      <h2>Partie terminée !</h2>
      <div class="final-score" id="finalScore"></div>
      <p id="endMessage"></p>
      <div class="recap-title">Récapitulatif</div>
      <div class="recap-grid" id="recapGrid"></div>
      <button class="restart-btn" onclick="startGame(currentCategory)">Rejouer</button>
      <br>
      <button class="back-menu-btn" onclick="showMenu()">← Changer de catégorie</button>
      <br><br>
      <a href="index.html" class="back-menu-btn">← Accueil</a>
    </div>
  </div>
</div>
<script src="data/countries.js"></script>
<script src="js/utils.js"></script>
<script src="js/normal.js"></script>
</body>
</html>
